name: Android CI (Testing)

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Get JRE 8
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre
          workflow_conclusion: completed
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: buildjre8
          name: jre8-pojav

      - name: Get JRE21
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: build.yml
          path: app_pojavlauncher/src/main/assets/components/jre-21
          workflow_conclusion: completed
          repo: AngelAuraMC/angelauramc-openjdk-build
          branch: buildjre17-21
          name: jre21-pojav

      # - name: Get JRE25
      #   uses: dawidd6/action-download-artifact@v9
      #   with:
      #     workflow: build.yml
      #     path: app_pojavlauncher/src/main/assets/components/jre-25
      #     workflow_conclusion: completed
      #     repo: FCL-Team/Android-OpenJDK-Build
      #     branch: Build_JRE_25
      #     name: jre25-multiarch

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          gradle-version: "8.11"
          cache-read-only: true

      - name: Patch MobileGlues for ARM-only build
        run: |
          # Skip x86/x86_64 builds for faster CI (only ARM devices are supported)
          sed -i 's/ndkVersion = "27.3.13750724"/ndkVersion = "27.3.13750724"\n        ndk {\n            \/\/ Only build for ARM architectures (skip x86\/x86_64 which are for emulators)\n            abiFilters += listOf("arm64-v8a", "armeabi-v7a")\n        }/' MobileGlues/build.gradle.kts

      - name: Build JRE JAR files
        run: |
          ./scripts/languagelist_updater.sh
          mkdir out
          # Build JRE JAR files (security manager, etc...)
          gradle :jre_lwjgl3glfw:build

      - name: Build Release .apk
        run: |
          # Build the launcher
          gradle :app_pojavlauncher:assembleRelease
          mv app_pojavlauncher/build/outputs/apk/release/app_pojavlauncher-release.apk build/KnightLauncher.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KnightLauncher
          path: build/KnightLauncher.*
